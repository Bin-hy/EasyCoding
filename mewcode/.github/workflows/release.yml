name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ── 构建二进制 ──
      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          mkdir -p dist
          suffix=""
          [ "$GOOS" = "windows" ] && suffix=".exe"
          out="dist/mewcode-${GOOS}-${GOARCH}${suffix}"
          go build -ldflags="-s -w -X 'main.version=${GITHUB_REF_NAME#v}'" -o "$out" ./cmd/mewcode/

      # ── 打包归档 ──
      - name: Package
        run: |
          cd dist
          suffix=""
          [ "${{ matrix.target.os }}" = "windows" ] && suffix=".exe"
          binary="mewcode-${{ matrix.target.os }}-${{ matrix.target.arch }}${suffix}"
          archive="mewcode_${GITHUB_REF_NAME#v}_${{ matrix.target.os }}_${{ matrix.target.arch }}"

          if [ "${{ matrix.target.os }}" = "windows" ]; then
            zip  "${archive}.zip"  "$binary"
            echo "asset=${archive}.zip" >> $GITHUB_ENV
          else
            tar -czf "${archive}.tar.gz" "$binary"
            echo "asset=${archive}.tar.gz" >> $GITHUB_ENV
          fi

      # ── 上传到 Release ──
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.asset }}
          generate_release_notes: true
