name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  # ───────────── 构建所有平台 ─────────────
  build:
    name: Build (${{ matrix.target.os }}/${{ matrix.target.arch }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mewcode
    strategy:
      matrix:
        target:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mewcode/go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          mkdir -p dist
          suffix=""
          [ "$GOOS" = "windows" ] && suffix=".exe"
          out="dist/mewcode-${GOOS}-${GOARCH}${suffix}"
          go build -ldflags="-s -w -X 'main.version=${GITHUB_REF_NAME#v}'" -o "$out" ./cmd/mewcode/

      - name: Package
        env:
          OS: ${{ matrix.target.os }}
          ARCH: ${{ matrix.target.arch }}
        run: |
          cd dist
          suffix=""
          [ "$OS" = "windows" ] && suffix=".exe"
          binary="mewcode-${OS}-${ARCH}${suffix}"
          archive="mewcode_${GITHUB_REF_NAME#v}_${OS}_${ARCH}"

          if [ "$OS" = "windows" ]; then
            zip "${archive}.zip" "$binary"
          else
            tar -czf "${archive}.tar.gz" "$binary"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: mewcode/dist/*
          if-no-files-found: error

  # ───────────── 汇总发布 ─────────────
  publish:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
